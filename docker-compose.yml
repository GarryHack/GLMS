services:

  # ── Container 1: SQL Server Express Database ──────────────────────────────────
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Glms@Str0ng2026"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "Glms@Str0ng2026"
        -Q "SELECT 1" -No
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── Container 2: GLMS Web API (Backend) ──────────────────────────────────────
  glms-backend-api:
    build:
      context: .
      dockerfile: GLMS.Api/Dockerfile
    container_name: glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Data Source=sql-server-db,1433;
        Initial Catalog=GLMSDB;
        User Id=sa;
        Password=Glms@Str0ng2026;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
        Encrypt=True
    ports:
      - "5200:8080"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network
    restart: on-failure

  # ── Container 3: GLMS MVC Web App (Frontend) ──────────────────────────────────
  glms-frontend-web:
    build:
      context: .
      dockerfile: GLMS.Web/Dockerfile
    container_name: glms-frontend-web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ApiBaseUrl: "http://glms-backend-api:8080"
    ports:
      - "5268:8080"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network
    restart: on-failure

# ── Shared resources ──────────────────────────────────────────────────────────
volumes:
  sqlserver_data:
    driver: local

networks:
  glms-network:
    driver: bridge
